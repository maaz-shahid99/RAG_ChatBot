<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: #16161e;
      border-bottom: 1px solid #2a2a3a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    header p { font-size: 12px; color: #666; margin-top: 2px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4ade80; }
    .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Main layout */
    .container { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #16161e;
      border-right: 1px solid #2a2a3a;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 4px; }

    .upload-area {
      border: 2px dashed #2a2a3a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-area:hover { border-color: #7c3aed; background: #1a1a2e; }
    .upload-area .icon { font-size: 28px; margin-bottom: 8px; }
    .upload-area p { font-size: 13px; color: #888; }
    .upload-area span { font-size: 11px; color: #555; }
    #file-input { display: none; }

    .url-section { display: flex; flex-direction: column; gap: 8px; }
    .url-input-wrap { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 9px 12px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #7c3aed; }

    .btn {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn-sm { padding: 7px 12px; font-size: 12px; }

    .sources-list { display: flex; flex-direction: column; gap: 6px; }
    .source-tag {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
      word-break: break-all;
    }
    .source-tag .s-icon { font-size: 14px; flex-shrink: 0; }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

    .welcome {
      text-align: center;
      margin: auto;
      padding: 40px;
    }
    .welcome .big-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 22px; color: #fff; margin-bottom: 8px; }
    .welcome p { font-size: 14px; color: #666; line-height: 1.6; }

    .msg { display: flex; gap: 12px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .msg.user .avatar { background: linear-gradient(135deg, #7c3aed, #3b82f6); }
    .msg.bot .avatar { background: #1e1e2e; border: 1px solid #2a2a3a; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .src { margin-top: 8px; font-size: 11px; color: #555; }
    .src span { color: #7c3aed; }

    /* Typing indicator */
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing .bubble span {
      width: 7px; height: 7px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Input bar */
    .input-bar {
      padding: 16px 24px;
      background: #16161e;
      border-top: 1px solid #2a2a3a;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #user-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    #user-input:focus { border-color: #7c3aed; }
    #user-input::placeholder { color: #444; }

    .send-btn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #4ade80; color: #000;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 99;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #f87171; color: #fff; }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>RAG Assistant</h1>
    <p>Powered by Groq · ChromaDB</p>
  </div>
  <div class="status"><div class="dot"></div> Online</div>
</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h3>Upload Document</h3>
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="icon">📄</div>
        <p>Click to upload</p>
        <span>PDF or DOCX</span>
      </div>
      <input type="file" id="file-input" accept=".pdf,.docx" onchange="uploadFile()" />
    </div>

    <div class="url-section">
      <h3>Add URL</h3>
      <div class="url-input-wrap">
        <input type="text" id="url-input" placeholder="https://example.com" />
        <button class="btn btn-sm" onclick="uploadUrl()">Add</button>
      </div>
    </div>

    <div>
      <h3>Ingested Sources</h3>
      <div class="sources-list" id="sources-list">
        <div style="font-size:12px;color:#444">No sources yet</div>
      </div>
      <button class="btn btn-sm" style="width:100%;margin-top:10px;background:linear-gradient(135deg,#dc2626,#f87171)" onclick="clearKnowledge()">🗑️ Clear Knowledge Base</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div id="chat-box">
      <div class="welcome">
        <div class="big-icon">🧠</div>
        <h2>Ask me anything</h2>
        <p>Upload a document or add a URL from the sidebar,<br/>then start chatting with your knowledge base.</p>
      </div>
    </div>

    <div class="input-bar">
      <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = "http://localhost:8000";
  const sources = [];

  function showToast(msg, error = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (error ? " error" : "");
    setTimeout(() => t.className = "toast", 2500);
  }

  function addSource(name) {
    if (sources.includes(name)) return;
    sources.push(name);
    const list = document.getElementById("sources-list");
    if (sources.length === 1) list.innerHTML = "";
    const icon = name.startsWith("http") ? "🌐" : "📄";
    list.innerHTML += `<div class="source-tag"><span class="s-icon">${icon}</span>${name}</div>`;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const query = input.value.trim();
    if (!query) return;

    // Clear welcome
    const box = document.getElementById("chat-box");
    const welcome = box.querySelector(".welcome");
    if (welcome) welcome.remove();

    appendMsg("user", query);
    input.value = "";

    // Typing indicator
    const typingId = "typing-" + Date.now();
    box.innerHTML += `<div class="msg bot typing" id="${typingId}">
      <div class="avatar">🤖</div>
      <div class="bubble"><span></span><span></span><span></span></div>
    </div>`;
    box.scrollTop = box.scrollHeight;

    const form = new FormData();
    form.append("query", query);
    form.append("session_id", "web-user");

    try {
      const res = await fetch(`${API}/chat`, { method: "POST", body: form });
      const data = await res.json();
      document.getElementById(typingId)?.remove();
      appendMsg("bot", data.answer, data.sources);
    } catch (e) {
      document.getElementById(typingId)?.remove();
      appendMsg("bot", "⚠️ Error connecting to backend. Is the server running?");
    }
  }

  function appendMsg(role, text, srcs = []) {
    const box = document.getElementById("chat-box");
    const avatar = role === "user" ? "👤" : "🤖";
    const srcHtml = srcs.length
      ? `<div class="src">📎 Sources: <span>${srcs.join(", ")}</span></div>`
      : "";
    box.innerHTML += `<div class="msg ${role}">
      <div class="avatar">${avatar}</div>
      <div><div class="bubble">${text}${srcHtml}</div></div>
    </div>`;
    box.scrollTop = box.scrollHeight;
  }

  async function uploadFile() {
    const file = document.getElementById("file-input").files[0];
    if (!file) return;
    showToast("⏳ Ingesting file...");
    const form = new FormData();
    form.append("file", file);
    try {
      const res = await fetch(`${API}/ingest/file`, { method: "POST", body: form });
      const data = await res.json();
      if (data.status === "ingested") {
        addSource(file.name);
        showToast("✅ File ingested!");
      } else {
        showToast(data.message || "Error ingesting file", true);
      }
    } catch (e) {
      showToast("❌ Failed to connect to backend", true);
    }
  }

  async function clearKnowledge() {
    if (!confirm("Clear all ingested documents and URLs?")) return;
    try {
      await fetch(`${API}/clear`, { method: "POST" });
      sources.length = 0;
      document.getElementById("sources-list").innerHTML = `<div style="font-size:12px;color:#444">No sources yet</div>`;
      showToast("🗑️ Knowledge base cleared!");
    } catch (e) {
      showToast("❌ Failed to clear", true);
    }
  }

  async function uploadUrl() {
    const url = document.getElementById("url-input").value.trim();
    if (!url) return showToast("Enter a URL first", true);
    showToast("⏳ Ingesting URL...");
    const form = new FormData();
    form.append("url", url);
    try {
      await fetch(`${API}/ingest/url`, { method: "POST", body: form });
      addSource(url);
      document.getElementById("url-input").value = "";
      showToast("✅ URL ingested!");
    } catch (e) {
      showToast("❌ Failed to connect to backend", true);
    }
  }
</script>
</body>
</html>
